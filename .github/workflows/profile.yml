name: Refresh profile card

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-card-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out profile repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Run generator tests
        run: python3 -m unittest discover -v

      - name: Refresh public GitHub statistics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate.py

      - name: Validate generated SVGs
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET

          for path in ("dark_mode.svg", "light_mode.svg"):
              ET.parse(path)
              print(f"valid XML: {path}")
          PY

      - name: Commit refreshed cards
        run: |
          if git diff --quiet -- dark_mode.svg light_mode.svg; then
            echo "Profile cards are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git commit -m "chore: refresh profile stats"
          git push
